<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Western Union - Acciones & Valores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #8b0000;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header img {
      height: 40px;
    }

    header span {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .badge {
      background: #f5a800;
      color: #8b0000;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      margin-left: auto;
    }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 36px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.09);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .icon {
      width: 48px;
      height: 48px;
      background: #fff3cd;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    h1 {
      font-size: 20px;
      color: #1a1a1a;
    }

    h1 span {
      display: block;
      font-size: 13px;
      color: #888;
      font-weight: 400;
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #8b0000;
      background: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .divider {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin: 20px 0 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #f5a800;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover {
      background: #e09900;
    }

    .note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <header>
    <span>Acciones & Valores</span>
    <div class="badge">Western Union</div>
  </header>

  <div class="container">
    <div class="card">

      <div class="card-header">
        <div class="icon">💸</div>
        <h1>
          Enviar o Cobrar Giro
          <span>Completa tus datos para continuar</span>
        </h1>
      </div>

      <div class="form-group">
        <label>Tipo de operación</label>
        <select>
          <option value="">Selecciona una opción</option>
          <option>Enviar dinero</option>
          <option>Cobrar giro</option>
        </select>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Juan">
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" placeholder="Pérez">
        </div>
      </div>

      <div class="form-group">
        <label>Número de documento</label>
        <input type="text" placeholder="CC / CE / Pasaporte">
      </div>

      <div class="form-group">
        <label>Teléfono / WhatsApp</label>
        <input type="tel" placeholder="+57 300 000 0000">
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@ejemplo.com">
      </div>

      <div class="divider">Información del giro</div>

      <div class="row">
        <div class="form-group">
          <label>País origen / destino</label>
          <input type="text" placeholder="Ej: Estados Unidos">
        </div>
        <div class="form-group">
          <label>Monto aproximado</label>
          <input type="text" placeholder="USD 500">
        </div>
      </div>

      <button>Continuar →</button>
      <p class="note">+180 oficinas en Colombia · Operación segura y rápida</p>

    </div>
  </div>

</body>
</html>
