<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente Virtual - Acciones & Valores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 780px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .chat-header {
      background: #8b0000;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-info strong {
      display: block;
      color: white;
      font-size: 15px;
    }

    .header-info span {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }

    .online-dot {
      width: 10px;
      height: 10px;
      background: #4caf50;
      border-radius: 50%;
      border: 2px solid white;
    }

    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.bot .bubble {
      background: #f3f3f3;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .msg.user .bubble {
      background: #8b0000;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble a {
      color: #8b0000;
      font-weight: 600;
      text-decoration: none;
    }

    .msg.bot .bubble a:hover { text-decoration: underline; }

    .msg.bot .bubble p { margin-bottom: 6px; }
    .msg.bot .bubble p:last-child { margin-bottom: 0; }

    .msg-time {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg.user .msg-time { text-align: right; }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: #f3f3f3;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      flex-shrink: 0;
    }

    .quick-btn {
      padding: 7px 14px;
      background: white;
      border: 1.5px solid #8b0000;
      color: #8b0000;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .quick-btn:hover {
      background: #8b0000;
      color: white;
    }

    /* INPUT */
    .chat-input {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #eee;
      flex-shrink: 0;
      background: white;
    }

    .chat-input textarea {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    .chat-input textarea:focus { border-color: #8b0000; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: #8b0000;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #6e0000; }
    .send-btn:disabled { background: #ccc; cursor: default; }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* POWERED BY */
    .powered {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      padding: 6px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <div class="chat-header">
    <div class="avatar">🏦</div>
    <div class="header-info">
      <strong>Asistente Acciones & Valores</strong>
      <span>Fondos · Western Union · Comercio Exterior</span>
    </div>
    <div class="online-dot"></div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="sendQuick('Quiero invertir mi dinero')">📈 Quiero invertir</button>
    <button class="quick-btn" onclick="sendQuick('Necesito enviar o cobrar un giro Western Union')">💸 Western Union</button>
    <button class="quick-btn" onclick="sendQuick('Tengo una empresa y necesito hacer pagos internacionales')">🌐 Comercio Exterior</button>
  </div>

  <div class="chat-input">
    <textarea id="inputMsg" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="powered">Powered by Acciones & Valores · IA</div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('inputMsg');
  const sendBtn = document.getElementById('sendBtn');
  const quickReplies = document.getElementById('quickReplies');

  // Historial de mensajes para el API
  const history = [];

  // Mensaje de bienvenida
  window.addEventListener('load', () => {
    setTimeout(() => {
      addBotMessage('¡Hola! 👋 Soy el asistente virtual de <strong>Acciones & Valores</strong>. Puedo ayudarte con fondos de inversión, giros Western Union o soluciones de comercio exterior. ¿En qué te puedo ayudar hoy?');
    }, 400);
  });

  function getTime() {
    return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  }

  function addBotMessage(html) {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.innerHTML = `<div class="bubble">${html}</div><span class="msg-time">${getTime()}</span>`;
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function addUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'msg user';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = getTime();
    msg.appendChild(bubble);
    msg.appendChild(time);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.id = 'typing';
    el.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function mdToHtml(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')   // **negrita**
      .replace(/\*(.+?)\*/g, '<em>$1</em>')                // *itálica*
      .replace(/\n{2,}/g, '</p><p>')                       // párrafos
      .replace(/\n/g, '<br>')                              // saltos de línea
      .replace(/^/, '<p>').replace(/$/, '</p>');           // envolver en <p>
  }

  async function sendMessage(text) {
    const msg = text || inputEl.value.trim();
    if (!msg) return;

    // Ocultar quick replies después del primer mensaje
    quickReplies.style.display = 'none';

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addUserMessage(msg);
    history.push({ role: 'user', content: msg });
    if (history.length > 40) history.splice(0, history.length - 40);

    const typingEl = showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      const reply = data?.content?.[0]?.text || 'Lo siento, hubo un problema. Intenta de nuevo.';

      if (reply === '__SIN_CREDITOS__') {
        addBotMessage('En este momento el servicio no está disponible. Por favor contáctanos por WhatsApp: <a href="https://wa.me/573112160255" target="_blank">+57 311 216 0255</a>');
      } else {
        addBotMessage(mdToHtml(reply));
        history.push({ role: 'assistant', content: reply });
      }

    } catch (e) {
      removeTyping();
      addBotMessage('Hubo un error de conexión. Verifica tu internet e intenta de nuevo.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendQuick(text) {
    sendMessage(text);
  }

  // Enter para enviar, Shift+Enter para salto de línea
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize del textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });
</script>

</body>
</html>
